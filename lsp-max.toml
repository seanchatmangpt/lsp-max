# lsp-max-compositor manifest. Each [[server]] is a child LSP the compositor
# spawns and multiplexes behind one LSP session. An editor/agent (e.g. Claude
# Code) binds a single LSP per file extension; the compositor is that front door
# and fans out to every child registered for the extension — diagnostics from
# all of them (FanAll, merged), request features from the Primary (FirstSuccess).
#
# `command` is resolved relative to the compositor's working directory (the
# workspace root). Run `cargo build` so the debug binaries exist, or replace the
# paths with absolute paths / PATH-resolved names for an installed deployment.
# `args = []`: these servers speak LSP over stdio with no subcommand. A server
# whose `command` fails to spawn degrades gracefully (logged, others continue).

[[server]]
id = "wasm4pm-lsp"
command = "target/debug/wasm4pm-lsp"
args = []
primary_extensions = [".ocel.json", ".receipt.json", ".ocel.jsonl"]
secondary_extensions = [".rs", ".ts", ".json"]
priority = "diagnostics-only"
# Per-server ANDON routing does not borrow the workspace union (AGENTS.md L7
# Speciation), so this list must cover every ERROR-severity code this server
# surfaces: WASM4PM-* (CROWN/GALL/DANGLING-REF/TIME-ORDER/UNKNOWN-ACTIVITY/
# PARSE-FAILED/MISSING-ADMISSION/VERDICT-*), the GGEN evidence law, and the
# unbound pack-handler code. COG- is the wiring half for breed-conformance laws
# (src/diagnostics/cognition_laws.rs); live emission is BLOCKED until ../wasm4pm
# is present. Only ERROR severity sets ANDON, so non-error members never block.
andon_code_prefixes = ["WASM4PM-", "GGEN-EVIDENCE-", "CLAP-PACK-HANDLER-UNBOUND", "COG-"]

[[server]]
id = "anti-llm-cheat-lsp"
command = "target/debug/anti-llm-cheat-lsp"
args = []
primary_extensions = [".rs", ".ts", ".tsx", ".json", ".jsonl", ".md"]
secondary_extensions = []
priority = "diagnostics-only"
# Cover the whole ANTI-LLM- namespace. `blocking: true` rules map to ERROR, and
# many families (SURFACE/ROUTE/RECEIPT/AUTH/ORACLE/ADMIT/MUT/CLAIM/CONTRACT/...)
# were self-isolating out of ANDON under the narrow CHEAT-C/VERSION- list.
andon_code_prefixes = ["ANTI-LLM-"]

[[server]]
id = "ggen-lsp"
command = "target/debug/ggen-lsp"
args = []
primary_extensions = [".ttl", ".rq", ".tera"]
secondary_extensions = []
priority = "full"
# Cover the whole GGEN- namespace (TPL/YIELD/SRC and others). Only ERROR blocks.
andon_code_prefixes = ["GGEN-"]
