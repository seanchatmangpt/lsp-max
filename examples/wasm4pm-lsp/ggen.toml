# ggen.toml — wasm4pm-lsp cognitive breed configuration generator
# Reads schema/cognition-breeds.ttl and generates breed registry, dispatch,
# module stubs, OCPN models, fitness reports, and paper fixtures.
# Run: ggen sync (from lsp-max workspace root)
# Generated files satisfy COG-001 through COG-012 scaffold requirements.

[meta]
name = "wasm4pm-lsp-breeds"
version = "26.6.20"

[ontology]
source = "../../schema/cognition-breeds.ttl"
standard_only = false

[generation]
output_dir = "examples/wasm4pm-lsp"

[sync]
enabled = true
on_change = "manual"
validate_after = true
conflict_mode = "fail"

[rdf]
formats = ["turtle"]
default_format = "turtle"
strict_validation = false

[templates]
enable_caching = true
auto_reload = false

# ── Rule 1: Breed Registry JSON ───────────────────────────────────────────────
# Satisfies: breeds/registry.json (COG-011 prerequisite)

[[generation.rules]]
name = "breed-registry"
description = "Generate breeds/registry.json from breed vocabulary"
query = { file = "sparql/breeds.rq" }
template = { file = "templates/registry.json.tera" }
output_file = "examples/wasm4pm-lsp/breeds/registry.json"
mode = "Overwrite"

# ── Rule 2: Dispatch Table ────────────────────────────────────────────────────
# Satisfies: src/breeds/dispatch.rs (COG-012 prerequisite)

[[generation.rules]]
name = "breed-dispatch"
description = "Generate src/breeds/dispatch.rs match table from breed vocabulary"
query = { file = "sparql/breeds.rq" }
template = { file = "templates/dispatch.rs.tera" }
output_file = "examples/wasm4pm-lsp/src/breeds/dispatch.rs"
mode = "Overwrite"

# ── Rules 3–11: Per-breed module stubs (COG-001) ─────────────────────────────
# One rule per breed — generates src/breeds/<module_stem>.rs

[[generation.rules]]
name = "breed-stub-eliza"
description = "Generate eliza breed module stub (frame.rs)"
query = { inline = """
PREFIX compat: <https://wasm4pm.dev/cognition/compat#>
SELECT ?breed_id ?breed_label ?breed_family ?module_stem ?struct_name ?paper_ref ?oracle_value ?status
WHERE {
    <https://wasm4pm.dev/cognition/breeds#eliza> compat:breedId ?breed_id ;
        compat:breedLabel ?breed_label ; compat:breedFamily ?breed_family ;
        compat:moduleStem ?module_stem ; compat:structName ?struct_name ;
        compat:paperRef ?paper_ref ; compat:oracleValue ?oracle_value ;
        compat:status ?status_node . ?status_node <http://www.w3.org/2000/01/rdf-schema#label> ?status .
}""" }
template = { file = "templates/breed_stub.rs.tera" }
output_file = "examples/wasm4pm-lsp/src/breeds/frame.rs"
mode = "CreateIfMissing"

