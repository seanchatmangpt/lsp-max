[project]
name = "ggen-lsp"
version = "26.6.9"
description = "Example LSP generated by ggen lsp-max pack — CANDIDATE"
authors = ["lsp-max"]
license = "MIT"

[ontology]
source = "schema/domain.ttl"
standard_only = false

[generation]
output_dir = "."

[inference]
rules = [
    { name = "standard-normalization", construct = "CONSTRUCT { ?s ?p ?o } WHERE { ?s ?p ?o } ORDER BY ?s ?p ?o" }
]

[[generation.rules]]
name = "backend"
query = { inline = "SELECT ?server_name ?language_id WHERE { BIND(\"GgenLsp\" AS ?server_name) BIND(\"ggen\" AS ?language_id) }" }
template = { file = "../../templates/lsp-max/backend.rs.tera" }
output_file = "src/backend.rs"
mode = "Skip"

[[generation.rules]]
name = "capabilities"
query = { file = "../../queries/lsp-max/capabilities.sparql" }
template = { file = "../../templates/lsp-max/capabilities.rs.tera" }
output_file = "src/capabilities.rs"
mode = "Overwrite"

[[generation.rules]]
name = "conformance"
query = { file = "../../queries/lsp-max/conformance.sparql" }
template = { file = "../../templates/lsp-max/conformance_vector.rs.tera" }
output_file = "src/conformance.rs"
mode = "Overwrite"
