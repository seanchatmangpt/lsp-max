[project]
name = "lsp-max-compositor"
language_id = "lsp"
version = "26.6.30"

[ontology]
source = "../../ontology/chicago_v26_6_30.ttl"

[generation]
output_dir = "."

[[packs]]
name     = "chicago-tdd-tools"
registry = "local"
path     = "../../../chicago-tdd-tools"

[[generation.rules]]
name        = "cc-scaffold-stubs"
description = "Generate scaffold!() stubs from ctt:ScaffoldStub ontology instances"
query       = { pack = "chicago-tdd-tools", output = "queries", file = "scaffold_stubs.rq" }
template    = { pack = "chicago-tdd-tools", output = "templates", file = "scaffold_stubs.rs.tera" }
output_file = "src/generated/{{ ticket_id | lower | replace(from='-', to='_') }}_{{ fn_name }}.rs"
mode        = "Create"

[[generation.rules]]
name        = "cc-chicago-tests"
description = "Generate #[chicago_test] acceptance tests from ctt:ScaffoldStub ontology instances"
query       = { pack = "chicago-tdd-tools", output = "queries", file = "scaffold_stubs.rq" }
template    = { pack = "chicago-tdd-tools", output = "templates", file = "chicago_test.rs.tera" }
output_file = "../../tests/chicago/{{ ticket_id | lower | replace(from='-', to='_') }}_{{ fn_name }}.rs"
mode        = "Create"
